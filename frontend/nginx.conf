events {}

http {

    include /etc/nginx/mime.types;

    server {

        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /api/ {
            proxy_pass http://internal-three-tier-internal-alb-415068828.ap-south-1.elb.amazonaws.com/;
        }
    }
}