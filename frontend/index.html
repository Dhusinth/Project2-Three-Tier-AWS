<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Three Tier AWS Project</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Three Tier AWS Architecture</h1>

        <p class="subtitle">
            Flask • Docker • Jenkins • Ansible • Terraform • AWS
        </p>

        <div class="card-container">

            <div class="card">
                <h2>Backend Health</h2>
                <p id="backend-status">Checking...</p>
            </div>

            <div class="card">
                <h2>Database Status</h2>
                <p id="db-status">Checking...</p>
            </div>

            <div class="card">
                <h2>Deployment</h2>
                <p>CI/CD via Jenkins Pipeline</p>
            </div>

            <div class="card">
                <h2>Infrastructure</h2>
                <p>Provisioned using Terraform</p>
            </div>

        </div>

        <button onclick="checkServices()">
            Refresh Status
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
